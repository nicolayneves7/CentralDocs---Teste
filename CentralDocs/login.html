<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CentralDocs - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button class="toggle-btn">🌙</button>

  <div class="container">

    <div class="card auth-card">

    <img src="Midias/LogoCentralDocsNova 2.png" alt="CentralDocs Logo" class="logo" style="width: 200px; height: auto; margin-bottom: 20px;">

    

      <h2>Login</h2>
      <form id="loginForm">

  <div class="error-message" id="loginError">
    ⚠️ Preencha email e senha
  </div>

  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginSenha" placeholder="Senha">

  <button type="submit">Entrar</button>

    </form>

      <p class="link-text">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </p>

      <p class="link-text">
        <a href="index.html">⬅ Voltar</a>
      </p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
