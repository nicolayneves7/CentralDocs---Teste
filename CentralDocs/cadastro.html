<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CentralDocs - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button class="toggle-btn">🌙</button>

  <div class="container">

    <div class="card auth-card">

 <img src="Midias/LogoCentralDocsNova 2.png" alt="CentralDocs Logo" class="logo" style="width: 200px; height: auto; margin-bottom: 20px;">

      <h2>Criar Conta</h2>

    <form id="cadastroForm">

  <div class="error-message" id="cadastroError"></div>

  <input type="text" id="nome" placeholder="Nome Completo">
  <input type="text" id="cpf" placeholder="CPF">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <input type="password" id="confirmar" placeholder="Confirmar Senha">

  <button type="submit">Cadastrar</button>

</form>

      <p class="link-text">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>

      <p class="link-text">
        <a href="index.html">⬅ Voltar</a>
      </p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
